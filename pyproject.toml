[project]
name = "tcms"
version = "0.1.0"
description = "Management system for tennis sports center"

dependencies = [
    "fastapi~=0.116.2",
    "pydantic-settings~=2.10.1",
    "SQLAlchemy~=2.0.43",
    "asyncpg~=0.30.0",
    "uvicorn~=0.35.0",
    "pre-commit~=4.3.0",
    "alembic~=1.16.5",
]

# конфиги RUFF
[tool.ruff]
line-length = 79
show-fixes = true

extend-exclude =[
    "alembic",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "B",    # flake8-bugbear
    "I",    # isort
    "ICN",  # flake8-import-conventions
    "PGH",  # pygrep-hooks
    "PIE",  # flake8-pie
    "PT",   # flake8-pytest-style
    "RET",  # flake8-return
    "T20",  # flake8-print
    "UP",   # pyupgrade
    "YTT",  # flake8-2020
]

[tool.ruff.format]
quote-style = "single"
